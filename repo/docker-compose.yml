services:
  db:
    image: mysql:8.0
    container_name: petsupplies-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: petsupplies
    command:
      - --default-time-zone=+00:00
      - --binlog_expire_logs_seconds=2592000
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --log_bin_trust_function_creators=1
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Force TCP check on 3306 so we don't go healthy
      # while the entrypoint temporary server is running.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petsupplies-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: petsupplies
      DB_USER: app_user
      DB_PASSWORD: app_pass
      FLYWAY_USER: migrator_user
      FLYWAY_PASSWORD: migrator_pass
      # Required: 64 hex chars (32-byte AES-256). Override in real deployments.
      APP_CRYPTO_HEX_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      ATTACHMENTS_DIR: /attachments
      ACH_ATTACHMENTS_DIR: /achievement_attachments
    expose:
      - "8080"
    volumes:
      - attachments:/attachments
      - achievement_attachments:/achievement_attachments
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/health | grep -q OK"]
      interval: 10s
      timeout: 3s
      retries: 30

  proxy:
    image: nginx:1.27-alpine
    container_name: petsupplies-proxy
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: petsupplies-backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpass
      MYSQL_DATABASE: petsupplies
    volumes:
      - backups:/backups
    # scripts & crontab baked into image

volumes:
  db_data:
  backups:
  attachments:
  achievement_attachments:

